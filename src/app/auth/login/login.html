<div class="container d-flex justify-content-center align-items-center vh-100">
  <div class="card shadow-lg border-0" style="max-width: 400px; width: 100%; border-radius: 20px;">
    <div class="card-body p-5">
      <h2 class="fw-bold mb-2 text-dark">Bienvenido</h2>
      <p class="text-muted mb-4 small">Inicia sesión en Galápagos Booking.</p>

      <div *ngIf="errorMsg" class="alert alert-danger small py-2">
        {{ errorMsg }}
      </div>

      <form #loginForm="ngForm" (ngSubmit)="acceder()">

        <div class="mb-3">
          <label class="form-label small fw-bold">Correo electrónico</label>
          <input
            type="email"
            name="email"
            [(ngModel)]="email"
            class="form-control rounded-3"
            placeholder="ejemplo@correo.com"
            required
            email
            #emailInput="ngModel"
            [class.is-invalid]="emailInput.invalid && (emailInput.dirty || emailInput.touched)">
          <div *ngIf="emailInput.invalid && (emailInput.dirty || emailInput.touched)" class="invalid-feedback small">
            <span *ngIf="emailInput.errors?.['required']">El correo es obligatorio.</span>
            <span *ngIf="emailInput.errors?.['email']">Introduce un correo válido.</span>
          </div>
        </div>

        <div class="mb-4">
          <label class="form-label small fw-bold">Contraseña</label>
          <input
            type="password"
            name="password"
            [(ngModel)]="password"
            class="form-control rounded-3"
            placeholder="Tu contraseña"
            required
            minlength="6"
            #passwordInput="ngModel"
            [class.is-invalid]="passwordInput.invalid && (passwordInput.dirty || passwordInput.touched)">
          <div *ngIf="passwordInput.invalid && (passwordInput.dirty || passwordInput.touched)" class="invalid-feedback small">
            <span *ngIf="passwordInput.errors?.['required']">La contraseña es obligatoria.</span>
            <span *ngIf="passwordInput.errors?.['minlength']">Mínimo 6 caracteres.</span>
          </div>
        </div>

        <button
          type="submit"
          [disabled]="loginForm.invalid"
          class="btn w-100 fw-bold py-2 rounded-pill text-white shadow-sm"
          style="background-color: #00afca; border: none;">
          Entrar
        </button>
      </form>

      <div class="text-center mt-4">
        <span class="text-muted small">¿Aún no tienes cuenta?</span>
        <a routerLink="/register" class="text-decoration-none small fw-bold ms-1" style="color: #004e64;">
          Regístrate aquí
        </a>
      </div>
    </div>
  </div>
</div>
