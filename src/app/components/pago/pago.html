<div class="container d-flex justify-content-center align-items-center min-vh-100">
  <div class="card p-5 shadow-lg border-0 rounded-4 text-center" style="max-width: 400px; width: 100%;">

    <div class="mb-4">
      <h2 class="fw-bold">Finalizar Reserva</h2>
      <p class="text-muted">Estás a un paso de confirmar tu experiencia en Galápagos.</p>
    </div>

    <div class="bg-light p-3 rounded-3 mb-4">
      <small class="text-uppercase text-muted fw-bold">Total a pagar</small>
      <h3 class="m-0 text-primary fw-bolder">$ {{ precioTotal | number:'1.2-2' }}</h3>
    </div>

    <button (click)="confirmarPago()"
            [disabled]="procesando"
            class="btn btn-primary w-100 py-3 fw-bold shadow-sm d-flex align-items-center justify-content-center"
            style="background-color: #0070ba; border: none;">

      <span *ngIf="!procesando">
        <i class="bi bi-paypal me-2"></i> Pagar con <b>PayPal</b>
      </span>

      <span *ngIf="procesando">
        <span class="spinner-border spinner-border-sm me-2"></span> Procesando...
      </span>
    </button>

    <p class="mt-3 small text-muted">Transacción segura simulada.</p>
  </div>
</div>
